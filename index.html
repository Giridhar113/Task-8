<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background:#000;
    color:#fff;
}

.container{
    width:90%;
    margin:60px auto;
}

.title{
    font-size:40px;
    font-weight:300;
    margin-bottom:50px;
}

.cards{
    display:flex;
    gap:40px;
}

.card{
    background:#2f3438;
    width:100%;
    max-width:400px;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    display:block;
}

.card-content{
    padding:40px 30px;
    position:relative;
    min-height:220px;
}

.card h2{
    font-size:32px;
    font-weight:400;
    margin-bottom:20px;
}

.card p{
    font-size:18px;
    line-height:1.6;
    color:#d3d3d3;
}

.arrow-btn{
    position:absolute;
    right:30px;
    bottom:40px;
    width:50px;
    height:50px;
    background:#4d87c7;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

.arrow-btn:hover{
    background:#6fa6e0;
}
</style>
</head>
<body>

<div class="container">

    <h1 class="title">Cutting edge solutions to power up your business</h1>

    <div class="cards">

        <!-- Card 1 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab" alt="">
            <div class="card-content">
                <h2>Industries</h2>
                <p>Select your industry. Discover our impact.</p>
                <div class="arrow-btn">→</div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="">
            <div class="card-content">
                <h2>Services</h2>
                <p>Experience our services. Transform your business.</p>
                <div class="arrow-btn">→</div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29" alt="">
            <div class="card-content">
                <h2>Products and Platforms</h2>
                <p>Explore our products. Accelerate your performance.</p>
                <div class="arrow-btn">→</div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
